services:
  postgres-db:
    image: postgres:16-alpine
    container_name: analytic_flow_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: analytic_flow_app
    ports:
      - "8501:8501"
    depends_on:
      - postgres-db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DIR: ${STORAGE_DIR}
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data: